services:
  postgres:
    image: postgres:15-alpine
    container_name: laughtube_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-laughtube}
      POSTGRES_USER: ${DB_USER:-laughtube_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-LaughTube206@#$}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    networks:
      - laughtube_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-laughtube_user} -d ${DB_NAME:-laughtube}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: laughtube_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-laughtube}
      DB_USER: ${DB_USER:-laughtube_user}
      DB_PASSWORD: ${DB_PASSWORD:-LaughTube206@#$}
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/var/www/html/public/uploads
    networks:
      - laughtube_network
    expose:
      - "9000"

  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: laughtube_laravel
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/var/www/html/public/uploads
    networks:
      - laughtube_network
    environment:
      - APP_ENV=production
      - APP_KEY=base64:dJW7cf4LmYFnpBKKPZp2M57fJANjCI4XJCcgrlH8EeQ=
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=laughtube
      - DB_USERNAME=laughtube_user
      - "DB_PASSWORD=LaughTube206@#$"
      - GOOGLE_CLIENT_ID=198207836705-nqt2kh6mv1nqgm05rg1osc76ff9cebv6.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - GOOGLE_REDIRECT_URI=https://www.laughtube.ca/api/v2/auth/google/callback
      - SESSION_DRIVER=array
      - LIVEKIT_HOST=livekit:7880
      - LIVEKIT_API_KEY=87d3037fcbeb6c500595d75572e380e1
      - LIVEKIT_API_SECRET=3d2428926499fa6023d904a93b3d854dbfa7f9bc70e4bbe919ee1c5682915c54

  frontend:
    image: node:20-alpine
    container_name: laughtube_frontend_builder
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
      - /app/node_modules
    command: sh -c "npm install && npm run build"
    restart: "no"

  encoder:
    build:
      context: ./encoder
      dockerfile: Dockerfile
    container_name: laughtube_encoder
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-laughtube}
      - DB_USER=${DB_USER:-laughtube_user}
      - DB_PASSWORD=${DB_PASSWORD:-LaughTube206@#$}
      - UPLOADS_DIR=/app/uploads/videos
      - OUTPUT_DIR=/app/uploads/encoded
      - THUMBS_DIR=/app/uploads/thumbnails
      - NODE_ENV=production
    volumes:
      - ./encoder:/app
      - backend_uploads:/app/uploads
      - /app/node_modules
    networks:
      - laughtube_network
    depends_on:
      postgres:
        condition: service_healthy

  livekit:
    image: livekit/livekit-server:latest
    container_name: laughtube_livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./docker/livekit/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    networks:
      - laughtube_network

  nginx:
    image: nginx:alpine
    container_name: laughtube_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
      - backend_uploads:/var/www/html/public/uploads:ro
      - frontend_dist:/var/www/frontend:ro
    depends_on:
      - backend
      - frontend
    networks:
      - laughtube_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  frontend_dist:
    driver: local

networks:
  laughtube_network:
    driver: bridge